services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      WELLGUARD_DEFAULT_OIL_PRICE: "70"
      WELLGUARD_DATA_DIR: "/data"

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: "http://localhost:8000"
    depends_on:
      - backend

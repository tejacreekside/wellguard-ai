services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wellguard
      POSTGRES_USER: wellguard
      POSTGRES_PASSWORD: wellguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      WELLGUARD_DEFAULT_OIL_PRICE: "70"
      WELLGUARD_DATA_DIR: "/data"
      WELLGUARD_DATABASE_URL: "postgresql+psycopg2://wellguard:wellguard@postgres:5432/wellguard"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: "http://localhost:8000"
    depends_on:
      - backend

volumes:
  postgres_data:
